<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certifications</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html {
        min-height: 100%;
    }

    body {
        min-height: 100vh;
        padding: 40px 20px;
        text-align: center;
        font-family: 'Rajdhani', sans-serif;
        background: linear-gradient(180deg, #0a0a0f 0%, #0d0d15 50%, #05050a 100%);
        background-attachment: fixed;
        color: white;
    }

    h1 {
        font-family: 'Orbitron', sans-serif;
        font-size: 42px;
        margin-top: 30px;
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 4px;
        color: #00f0ff;
        text-shadow: 0 0 30px rgba(0, 240, 255, 0.5);
    }

    .subtitle {
        font-size: 16px;
        color: #888;
        letter-spacing: 2px;
        margin-bottom: 50px;
    }

    .grid {
        margin-top: 40px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 25px;
        width: 90%;
        max-width: 800px;
        margin-left: auto;
        margin-right: auto;
    }

    .card {
        position: relative;
        padding: 30px 25px;
        border-radius: 15px;
        background: rgba(0, 240, 255, 0.03);
        border: 1px solid rgba(0, 240, 255, 0.2);
        color: white;
        font-size: 20px;
        font-weight: 600;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: space-between;
        transition: all 0.3s ease;
        overflow: hidden;
    }

    .card::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.1), transparent);
        transition: left 0.5s ease;
    }

    .card:hover::before {
        left: 100%;
    }

    .card:hover {
        transform: translateY(-5px);
        border-color: #00f0ff;
        box-shadow: 0 10px 40px rgba(0, 240, 255, 0.2);
        background: rgba(0, 240, 255, 0.08);
    }

    .card-icon {
        font-size: 28px;
        margin-right: 15px;
    }

    .card-arrow {
        font-size: 24px;
        color: #00f0ff;
        transition: transform 0.3s ease;
    }

    .card:hover .card-arrow {
        transform: translateX(5px);
    }

    #back-btn {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-top: 50px;
        padding: 15px 30px;
        border: 1px solid rgba(0, 240, 255, 0.3);
        border-radius: 50px;
        color: #00f0ff;
        text-decoration: none;
        font-family: 'Orbitron', sans-serif;
        font-size: 14px;
        letter-spacing: 2px;
        transition: all 0.3s ease;
    }

    #back-btn:hover {
        background: rgba(0, 240, 255, 0.1);
        border-color: #00f0ff;
        box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
    }

    #stars-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 0;
        pointer-events: none;
        opacity: 0.75;
    }

    h1, .subtitle, .grid, #back-btn {
        position: relative;
        z-index: 1;
    }
</style>

</head>
<body>

<canvas id="stars-canvas"></canvas>

<h1>Certifications</h1>
<p class="subtitle">// MES DIPLÔMES & ATTESTATIONS</p>

<div class="grid">
    <a class="card" href="cnil/index.html">
        <span><span class="card-icon">🛡️</span> Certification CNIL</span>
        <span class="card-arrow">→</span>
    </a>
    <a class="card" href="ansi/attestation-pdf-benjamin.pdf" target="_blank">
        <span><span class="card-icon">🔐</span> ANSSI Cybersécurité</span>
        <span class="card-arrow">→</span>
    </a>
    <a class="card" href="ebios/index.html">
        <span><span class="card-icon">⚠️</span> EBIOS Risk Manager</span>
        <span class="card-arrow">→</span>
    </a>
</div>

<a id="back-btn" href="../index.html">← RETOUR</a>

<script>
const canvas = document.getElementById("stars-canvas");
const ctx = canvas.getContext("2d");
let stars = [];
const STAR_COUNT = 120;

let mouse = { x: null, y: null, radius: 150 };

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

function createStar() {
    return {
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        baseX: 0,
        baseY: 0,
        size: Math.random() * 2.5 + 0.5,
        twinkleSpeed: Math.random() * 0.0015 + 0.0005,
        twinklePhase: Math.random() * Math.PI * 2
    };
}

function initStars() {
    stars = [];
    for (let i = 0; i < STAR_COUNT; i++) {
        const star = createStar();
        star.baseX = star.x;
        star.baseY = star.y;
        stars.push(star);
    }
}

function drawStar(star, time) {
    const twinkle = Math.sin(time * star.twinkleSpeed * 1000 + star.twinklePhase);
    const opacity = 0.25 + (twinkle + 1) * 0.15;

    if (mouse.x !== null && mouse.y !== null) {
        const dx = star.baseX - mouse.x;
        const dy = star.baseY - mouse.y;
        const distance = Math.sqrt(dx * dx + dy * dy);

        if (distance < mouse.radius) {
            const force = (mouse.radius - distance) / mouse.radius;
            const angle = Math.atan2(dy, dx);
            star.x = star.baseX + Math.cos(angle) * force * 50;
            star.y = star.baseY + Math.sin(angle) * force * 50;
        } else {
            star.x = star.baseX;
            star.y = star.baseY;
        }
    } else {
        star.x = star.baseX;
        star.y = star.baseY;
    }

    const gradient = ctx.createRadialGradient(star.x, star.y, 0, star.x, star.y, star.size * 4);
    gradient.addColorStop(0, `rgba(255, 255, 255, ${opacity})`);
    gradient.addColorStop(0.5, `rgba(255, 255, 255, ${opacity * 0.3})`);
    gradient.addColorStop(1, "rgba(255, 255, 255, 0)");

    ctx.beginPath();
    ctx.arc(star.x, star.y, star.size * 4, 0, Math.PI * 2);
    ctx.fillStyle = gradient;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
    ctx.fill();
}

function animate(time) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(star => drawStar(star, time / 1000));
    requestAnimationFrame(animate);
}

window.addEventListener("mousemove", (e) => { mouse.x = e.x; mouse.y = e.y; });
window.addEventListener("mouseout", () => { mouse.x = null; mouse.y = null; });
window.addEventListener("resize", () => { resizeCanvas(); initStars(); });

resizeCanvas();
initStars();
animate(0);
</script>

</body>
</html>
