<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module 6</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Rajdhani', sans-serif;
            background: linear-gradient(180deg, #0a0a0f 0%, #0d0d15 50%, #05050a 100%);
            color: white;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 80px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 8px;
            color: #00f0ff;
            text-shadow: 0 0 50px rgba(0, 240, 255, 0.6);
            text-align: center;
        }

        #back-btn {
            margin-top: 60px;
            padding: 15px 30px;
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 50px;
            color: #00f0ff;
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        #back-btn:hover {
            background: rgba(0, 240, 255, 0.1);
            border-color: #00f0ff;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }
    </style>
</head>
<body>
    <h1>Bonjour Albert</h1>
    <a id="back-btn" href="../index.html">← RETOUR</a>
</body>
</html>
