<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>TP - Métiers du Développement</title>
  <style>
    .btn-retour {
        position: fixed;
        bottom: 20px;
        left: 20px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 24px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        text-decoration: none;
        border-radius: 50px;
        font-family: 'Segoe UI', sans-serif;
        font-weight: 600;
        font-size: 14px;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        transition: all 0.3s ease;
        z-index: 1000;
    }
    .btn-retour:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }
    .btn-retour::before {
        content: "\2190";
        font-size: 18px;
    }
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: grid;
      grid-template-rows: 15% 85%;
      grid-template-columns: 20% 80%;
    }

    #f1 {
      grid-column: 1 / span 2;
      width: 100%;
      height: 100%;
      border: 1px solid black;
    }

    #f2 {
      grid-row: 2;
      grid-column: 1;
      width: 100%;
      height: 100%;
      border: 1px solid black;
    }

    #f3 {
      grid-row: 2;
      grid-column: 2;
      width: 100%;
      height: 100%;
      border: 1px solid black;
    }
  </style>
</head>
<body>
  <!-- En-tête -->
  <iframe id="f1" srcdoc="
    <h1 style='text-align:center; color:darkblue;'>Présentation des métiers en développement</h1>
  "></iframe>

  <!-- Sommaire -->
  <iframe id="f2" srcdoc="
    <h3>Sommaire des métiers</h3>
    <ol>
      <li><a href='metier1.html' target='f3'>Métier 1</a></li>
      <li><a href='metier2.html' target='f3'>Métier 2</a></li>
      <li><a href='metier3.html' target='f3'>Métier 3</a></li>
      <li><a href='metier4.html' target='f3'>Métier 4</a></li>
    </ol>
  "></iframe>
  <a href="../index.html" class="btn-retour">Retour au sommaire</a>

  <!-- Contenu principal -->
  <iframe id="f3" name="f3" srcdoc="
    <h2 style='text-align:center;'>Choisissez un métier dans le sommaire</h2>
  "></iframe>
</body>
</html>
